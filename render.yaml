services:
  - type: web
    name: recycleit-backend
    env: python
    rootDir: backend
    buildCommand: "curl -LsSf https://astral.sh/uv/install.sh | sh && $HOME/.local/bin/uv sync"
    startCommand: "$HOME/.local/bin/uv run uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
